<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华语绘本故事时间</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: #FBF7F0;
    color: #342C22;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999; opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 256px;
  }

  /* Header */
  .site-header {
    background: #342C22;
    color: #FBF7F0;
    padding: 1.25rem 1.5rem;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .site-header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .site-header p {
    font-size: 0.78rem;
    opacity: 0.6;
    margin-top: 0.25rem;
  }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* HOME VIEW */
  .home-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }
  .home-intro {
    text-align: center;
    margin-bottom: 2rem;
  }
  .home-intro h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .home-intro p {
    font-size: 0.9rem;
    color: #7A6D5E;
    line-height: 1.6;
  }

  .grade-cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .grade-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 14px;
    padding: 1.5rem 1.8rem;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }
  .grade-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    border-color: rgba(192,67,61,0.3);
  }
  .grade-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .grade-card:nth-child(1) .grade-icon { background: #FDEBD0; }
  .grade-card:nth-child(2) .grade-icon { background: #D5F5E3; }
  .grade-card:nth-child(3) .grade-icon { background: #D6EAF8; }
  .grade-info h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.15rem;
    font-weight: 700;
  }
  .grade-info p {
    font-size: 0.82rem;
    color: #7A6D5E;
    margin-top: 0.2rem;
  }
  .grade-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: #A89A8A;
    background: rgba(209,199,186,0.2);
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* GRADE VIEW */
  .grade-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.85rem;
    color: #7A6D5E;
    cursor: pointer;
    padding: 0.5rem 0;
    margin-bottom: 1rem;
    background: none; border: none;
    font-family: 'Noto Sans SC', sans-serif;
    transition: color 0.2s;
  }
  .back-btn:hover { color: #C0433D; }

  .grade-header {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid rgba(209,199,186,0.3);
  }

  .book-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .book-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.9rem 1.2rem;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.3);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .book-item:hover {
    background: rgba(192,67,61,0.05);
    border-color: rgba(192,67,61,0.25);
  }
  .book-item .item-num {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 0.85rem;
    color: #A89A8A;
    width: 1.8rem;
    text-align: center;
    flex-shrink: 0;
  }
  .book-item .item-title {
    font-size: 0.95rem;
    font-weight: 500;
    flex: 1;
  }
  .book-item .item-en {
    font-size: 0.75rem;
    color: #A89A8A;
    margin-top: 0.15rem;
  }
  .book-item .item-arrow {
    color: #C0433D;
    font-size: 0.9rem;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .book-item:hover .item-arrow { opacity: 1; }

  /* PLAYER VIEW */
  .player-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #1A150F;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    margin-bottom: 1.25rem;
  }
  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .book-info {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(209,199,186,0.4);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    margin-bottom: 1rem;
  }
  .book-info .book-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .book-info .book-title-en {
    font-size: 0.95rem;
    color: #A89A8A;
    font-weight: 400;
    margin-left: 0.5rem;
  }
  .book-info .book-author {
    font-size: 0.88rem;
    color: #7A6D5E;
    margin-top: 0.4rem;
  }
  .book-info .book-note {
    font-size: 0.88rem;
    color: #594D3F;
    line-height: 1.6;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(209,199,186,0.3);
  }
  .meta-badges {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin-top: 0.65rem;
  }
  .meta-badge {
    font-size: 0.72rem; font-weight: 500;
    padding: 0.25rem 0.7rem; border-radius: 999px;
    background: #F9EFE2; color: #7D4F2C;
  }
  .meta-badge.channel { background: #dce8d4; color: #2E7048; }
  .meta-badge.grade { background: #D6EAF8; color: #2C5F8A; }

  .library-reminder {
    max-width: 900px;
    margin: 0 auto 1rem;
    padding: 1rem 1.5rem;
    background: rgba(62,142,96,0.08);
    border: 1px solid rgba(62,142,96,0.2);
    border-radius: 10px;
    font-size: 0.85rem;
    color: #2E7048;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .library-icon { font-size: 1.5rem; flex-shrink: 0; }

  .player-nav {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.55rem 1.1rem;
    border: 1px solid rgba(209,199,186,0.5);
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 0.82rem;
    color: #594D3F;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .nav-btn:hover { background: #342C22; color: #FBF7F0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: rgba(255,255,255,0.6); color: #594D3F; }

  @media (max-width: 600px) {
    .home-container { padding: 1.5rem 1rem; }
    .grade-card { padding: 1rem 1.2rem; }
    .grade-icon { width: 44px; height: 44px; font-size: 1.3rem; }
    .player-container { padding: 1rem; }
    .book-info { padding: 1rem 1.2rem; }
    .book-info .book-title { font-size: 1.2rem; }
    .book-info .book-title-en { display: block; margin-left: 0; margin-top: 0.15rem; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1 onclick="showHome()">华语绘本故事时间</h1>
  <p>看完视频，去图书馆找到这本书吧！</p>
</header>

<!-- HOME VIEW -->
<div class="view active" id="view-home">
  <div class="home-container">
    <div class="home-intro">
      <h2>选择年级</h2>
      <p>点击年级查看适合的绘本故事，<br>观看完视频后带孩子去图书馆找到这本书！</p>
    </div>
    <div class="grade-cards">
      <div class="grade-card" onclick="showGrade(1)">
        <div class="grade-icon">🌱</div>
        <div class="grade-info">
          <h3>一年级</h3>
          <p>简单有趣，培养阅读兴趣</p>
        </div>
        <span class="grade-count" id="count-1"></span>
      </div>
      <div class="grade-card" onclick="showGrade(2)">
        <div class="grade-icon">🌿</div>
        <div class="grade-info">
          <h3>二年级</h3>
          <p>故事丰富，拓展想象力</p>
        </div>
        <span class="grade-count" id="count-2"></span>
      </div>
      <div class="grade-card" onclick="showGrade(3)">
        <div class="grade-icon">🌳</div>
        <div class="grade-info">
          <h3>三年级</h3>
          <p>内容深入，引发思考</p>
        </div>
        <span class="grade-count" id="count-3"></span>
      </div>
    </div>
  </div>
</div>

<!-- GRADE VIEW -->
<div class="view" id="view-grade">
  <div class="grade-container">
    <button class="back-btn" onclick="showHome()">&#9664; 返回选择年级</button>
    <div class="grade-header" id="grade-title"></div>
    <div class="book-list" id="book-list"></div>
  </div>
</div>

<!-- PLAYER VIEW -->
<div class="view" id="view-player">
  <div class="player-container">
    <button class="back-btn" id="back-to-grade">&#9664; 返回书单</button>
    <div class="video-container">
      <iframe id="video-player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <div class="book-info" id="book-info"></div>
    <div class="library-reminder">
      <span class="library-icon">📚</span>
      <span>看完这个故事了吗？去图书馆找到这本书，翻开它，你会发现更多视频里没有的精彩细节！</span>
    </div>
    <div class="player-nav">
      <button class="nav-btn" id="prev-btn" onclick="goBook(-1)">&#9664; 上一本</button>
      <button class="nav-btn" id="next-btn" onclick="goBook(1)">下一本 &#9654;</button>
    </div>
  </div>
</div>

<script>
const books = [
  { n:1, title:"好饿的毛毛虫", en:"The Very Hungry Caterpillar", author:"[美] 艾瑞·卡尔 (Eric Carle)", channel:"非讀BOOK", age:"3–6岁", vid:"WKLZCeA1v3k", note:"全球经典绘本的中文朗读版，色彩缤纷的拼贴画风格，教孩子认识食物、数字和蝴蝶的蜕变。", grade:1 },
  { n:2, title:"猜猜我有多爱你", en:"Guess How Much I Love You", author:"[爱尔兰] 山姆·麦克布雷尼 文 / 安妮塔·婕朗 图", channel:"亲子阅读ReadForKid", age:"3–6岁", vid:"WTMW9xRTxKc", note:"大兔子和小兔子之间温馨的爱的比赛，是亲子共读的永恒经典。", grade:1 },
  { n:3, title:"逃家小兔", en:"The Runaway Bunny", author:"[美] 玛格丽特·怀兹·布朗 文 / 克雷门·赫德 图", channel:"爱哆有声绘本故事IDOL", age:"3–6岁", vid:"Dk7fB0rXw0k", note:"小兔子想要离家出走，妈妈总是变成各种形象追随他——无条件的母爱故事。", grade:1 },
  { n:4, title:"大卫，不可以", en:"No, David!", author:"[美] 大卫·香农 (David Shannon)", channel:"Easy Chinese with Ms. Ava", age:"3–6岁", vid:"B_6GiGT9r3A", note:"调皮捣蛋的大卫总是被妈妈说\"不可以\"，结尾却给了孩子最温暖的拥抱。", grade:1 },
  { n:5, title:"我爸爸", en:"My Dad", author:"[英] 安东尼·布朗 (Anthony Browne)", channel:"中文有声绘本", age:"3–6岁", vid:"k4nJSZng5wc", note:"用孩子的视角描绘爸爸的伟大形象，幽默温馨，是父亲节的最佳朗读选择。", grade:1 },
  { n:6, title:"我妈妈", en:"My Mum", author:"[英] 安东尼·布朗 (Anthony Browne)", channel:"爱哆有声绘本故事IDOL", age:"3–6岁", vid:"B68t1HQe3ec", note:"与《我爸爸》呼应的经典之作，展现妈妈既柔软又强大的多面形象。", grade:1 },
  { n:7, title:"鳄鱼怕怕牙医怕怕", en:"Crocodile and Dentist", author:"[日] 五味太郎", channel:"格子酱讲绘本", age:"3–6岁", vid:"xweAANgI5AU", note:"鳄鱼和牙医互相害怕对方，重复句式巧妙有趣，帮助孩子克服看牙恐惧。", grade:1 },
  { n:8, title:"彩虹鱼", en:"The Rainbow Fish", author:"[瑞士] 马克斯·菲斯特 (Marcus Pfister)", channel:"中文有声绘本", age:"3–6岁", vid:"2-K1tJQ0_kI", note:"一条闪闪发光的鱼学会了分享的快乐，书中的亮片印刷让孩子着迷。", grade:2 },
  { n:9, title:"花格子大象艾玛", en:"Elmer", author:"[英] 大卫·麦基 (David McKee)", channel:"中文有声故事绘本书", age:"3–6岁", vid:"Wc3MdqfYr8Q", note:"一只五颜六色的大象学会接受自己的与众不同，英国\"好书大家读\"年度童书。", grade:2 },
  { n:10, title:"小房子变大房子", en:"A Squash and a Squeeze", author:"[英] 朱莉娅·唐纳森 文 / 阿克塞尔·舍夫勒 图", channel:"亲子阅读ReadForKid", age:"3–6岁", vid:"JARwgVFs2S0", note:"老奶奶嫌房子太小，聪明老先生的建议却出人意料——幽默哲理故事。", grade:2 },
  { n:11, title:"落叶跳舞", en:"Dancing Leaves", author:"[日] 伊东宽", channel:"格子酱讲绘本", age:"3–6岁", vid:"96uw73zW9Xg", note:"用真实落叶拼贴出生动画面，鼓励孩子观察自然、发挥想象力。", grade:2 },
  { n:12, title:"小树的四季", en:"A Tree for All Seasons", author:"华语原创绘本", channel:"格子酱讲绘本", age:"3–6岁", vid:"cQ41g3hNjxw", note:"跟随小树经历春夏秋冬，感受自然四季的变化与生命的循环。", grade:2 },
  { n:13, title:"花婆婆", en:"Miss Rumphius", author:"[美] 芭芭拉·库尼 (Barbara Cooney)", channel:"有声绘本频道", age:"5–8岁", vid:"SiYpwv-0UPE", note:"美国国家图书奖作品，讲述让世界变得更美丽的使命，适合种下梦想的种子。", grade:2 },
  { n:14, title:"爱心树", en:"The Giving Tree", author:"[美] 谢尔·希尔弗斯坦 (Shel Silverstein)", channel:"有声绘本频道", age:"5–8岁", vid:"5RHfSclH7fY", note:"一棵大树无私地奉献自己给小男孩——关于爱与给予的深刻寓言。", grade:2 },
  { n:15, title:"蚯蚓的日记", en:"Diary of a Worm", author:"[美] 朵琳·克罗宁 文 / 哈利·布里斯 图", channel:"爱哆有声绘本故事IDOL", age:"5–8岁", vid:"QN2FFbmJ-bQ", note:"以日记形式记录小蚯蚓的趣事，幽默的视角让孩子认识自然世界。", grade:3 },
  { n:16, title:"活了100万次的猫", en:"The Cat That Lived a Million Times", author:"[日] 佐野洋子", channel:"爱哆有声绘本故事IDOL", age:"5–8岁", vid:"Zp2kXDALWwc", note:"日本绘本大奖作品，探讨生命与爱的哲学故事，被誉为\"读一百万次也不厌倦的名作\"。", grade:3 },
  { n:17, title:"爷爷一定有办法", en:"Something from Nothing", author:"[加] 菲比·乔尔森 文 / 改编自犹太民间故事", channel:"有声绘本频道", age:"5–8岁", vid:"_zaK1S3jsNk", note:"爷爷把一条旧毯子不断改造成新物品，展现智慧与爱的传承。", grade:3 },
  { n:18, title:"七只瞎老鼠", en:"Seven Blind Mice", author:"[美] 杨志成 (Ed Young)", channel:"亲子阅读ReadForKid", age:"5–8岁", vid:"qe_VWhdyXrg", note:"盲人摸象的现代版，凯迪克银奖作品，教孩子学会全面看问题。", grade:3 },
  { n:19, title:"阿诗的大花布", en:"A Shi's Big Floral Cloth", author:"华语原创绘本", channel:"亲子阅读ReadForKid", age:"5–8岁", vid:"fYfUBX7ZTM4", note:"奶奶织的大花布承载着家族温情，入选\"中国原创绘本200\"榜单。", grade:3 },
  { n:20, title:"吃书的孩子", en:"The Incredible Book Eating Boy", author:"[爱尔兰] 奥利弗·杰弗斯 (Oliver Jeffers)", channel:"绘本趣读 Story Time with Jing", age:"5–8岁", vid:"WnK88yfGBn4", note:"小男孩发现吃书比读书更快，但最终领悟到阅读的真正乐趣！", grade:3 },
];

const gradeNames = { 1: "一年级", 2: "二年级", 3: "三年级" };
let currentGrade = null;
let currentGradeBooks = [];
let currentBookIdx = 0;

// Set counts
[1,2,3].forEach(g => {
  document.getElementById('count-' + g).textContent = books.filter(b => b.grade === g).length + ' 本';
});

function switchView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function showHome() {
  // Stop video when leaving
  document.getElementById('video-player').src = '';
  switchView('home');
}

function showGrade(g) {
  currentGrade = g;
  currentGradeBooks = books.filter(b => b.grade === g);
  document.getElementById('grade-title').textContent = gradeNames[g] + ' — 绘本故事 (' + currentGradeBooks.length + '本)';

  const list = document.getElementById('book-list');
  list.innerHTML = currentGradeBooks.map((b, i) => `
    <a class="book-item" onclick="showPlayer(${i})">
      <span class="item-num">${String(i + 1).padStart(2, '0')}</span>
      <div style="flex:1">
        <div class="item-title">${b.title}</div>
        <div class="item-en">${b.en}</div>
      </div>
      <span class="item-arrow">&#9654;</span>
    </a>
  `).join('');

  switchView('grade');
}

function showPlayer(idx) {
  currentBookIdx = idx;
  const b = currentGradeBooks[idx];

  document.getElementById('video-player').src =
    'https://www.youtube-nocookie.com/embed/' + b.vid + '?rel=0&modestbranding=1&showinfo=0&iv_load_policy=3';

  document.getElementById('book-info').innerHTML = `
    <div class="book-title">${b.title}<span class="book-title-en">${b.en}</span></div>
    <div class="book-author">${b.author}</div>
    <div class="meta-badges">
      <span class="meta-badge">${b.age}</span>
      <span class="meta-badge grade">${gradeNames[b.grade]}</span>
      <span class="meta-badge channel">${b.channel}</span>
    </div>
    <div class="book-note">${b.note}</div>
  `;

  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === currentGradeBooks.length - 1;

  document.getElementById('back-to-grade').onclick = () => {
    document.getElementById('video-player').src = '';
    showGrade(currentGrade);
  };

  switchView('player');
}

function goBook(dir) {
  const next = currentBookIdx + dir;
  if (next >= 0 && next < currentGradeBooks.length) showPlayer(next);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') goBook(-1);
  if (e.key === 'ArrowRight') goBook(1);
  if (e.key === 'Escape') {
    const playerView = document.getElementById('view-player');
    const gradeView = document.getElementById('view-grade');
    if (playerView.classList.contains('active')) {
      document.getElementById('video-player').src = '';
      showGrade(currentGrade);
    } else if (gradeView.classList.contains('active')) {
      showHome();
    }
  }
});
</script>
